{{- if .Values.dashboards.springBootHttp.enabled }}
{{ $name := printf "%s-spring-boot-http-dashboard" .Release.Namespace  }}
{{ $uid :=  $name | sha1sum  }}
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    {{- include "monitoring-extras.dashboardLabels" . | nindent 4 }}
  name: {{ $name | quote }}
data:
  {{ $name }}.json: |
    {{- $.Files.Get "dashboards/spring-boot-http-dashboard.json" | replace "$uid" $uid | nindent 4 }}
{{- end }}
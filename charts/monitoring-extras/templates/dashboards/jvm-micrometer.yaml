{{- if and .Values.dashboards.enabled .Values.dashboards.jvmMicrometer.enabled }}
{{ $name := printf "%s-jvm-micrometer-dashboard" .Release.Namespace  }}
{{ $uid :=  $name | sha1sum  }}
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    {{- include "monitoring-extras.dashboardLabels" . | nindent 4 }}
  name: {{ $name | quote }}
data:
  {{ $name }}.json: |
    {{- $.Files.Get "dashboards/jvm-micrometer-dashboard.json" | replace "$uid" $uid | nindent 4 }}
{{- end }}
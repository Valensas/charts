{{- if and .Values.dashboards.enabled .Values.dashboards.macmon.enabled }}
{{ $name := printf "%s-macmon-dashboard" .Release.Namespace  }}
{{ $uid :=  $name | sha1sum  }}
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    {{- include "monitoring-extras.dashboardLabels" . | nindent 4 }}
  name: {{ $name | quote }}
data:
  {{ $name }}.json: |
    {{- $.Files.Get "dashboards/macmon.json" | replace "$uid" $uid | nindent 4 }}
{{- end }}